<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Nexus CRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366f1'/><text x='16' y='23' font-size='20' font-weight='900' text-anchor='middle' fill='white' font-family='system-ui,sans-serif'>N</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 70% 55% at 20% 35%, rgba(99,102,241,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 55% 55% at 78% 65%, rgba(139,92,246,0.08) 0%, transparent 65%),
        #0d0d1b;
    }
    .card {
      background: #fff;
      border-radius: 22px;
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 30px 80px rgba(0,0,0,0.55);
      text-align: center;
    }
    .card-top {
      background: linear-gradient(150deg, #0f0f21 0%, #14142f 100%);
      padding: 36px 32px 32px;
    }
    .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo-mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(145deg, #6366f1 0%, #8b5cf6 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
    .logo-text { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
    .code {
      font-size: 80px;
      font-weight: 900;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 12px;
    }
    .title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .sub { font-size: 13px; color: rgba(255,255,255,0.4); }
    .card-body { padding: 28px 32px 32px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff; border: none; border-radius: 10px;
      padding: 12px 24px; font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer; text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: 1.5px solid #e8e8f4;
      color: #4a4a68; border-radius: 10px;
      padding: 11px 20px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; margin-top: 12px;
      text-decoration: none; transition: border-color 0.15s;
    }
    .btn-ghost:hover { border-color: #6366f1; color: #6366f1; }
    .btns { display: flex; flex-direction: column; align-items: center; gap: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-top">
      <div class="logo">
        <div class="logo-mark">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="white">
            <path d="M3 4a1 1 0 011-1h4a1 1 0 010 2H6.414l2.293 2.293a1 1 0 01-1.414 1.414L5 6.414V8a1 1 0 01-2 0V5a1 1 0 010-.083V4zm9 0a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1h-.083A1 1 0 0116 8V6.414l-2.293 2.293a1 1 0 11-1.414-1.414L14.586 5H13a1 1 0 01-1-1zM5 12a1 1 0 011 1v1.586l2.293-2.293a1 1 0 011.414 1.414L7.414 16H9a1 1 0 010 2H6a1 1 0 01-1-1v-3a1 1 0 011-1zm10 1a1 1 0 10-2 0v1.586l-2.293-2.293a1 1 0 10-1.414 1.414L11.586 16H10a1 1 0 100 2h3a1 1 0 001-1v-3z"/>
          </svg>
        </div>
        <span class="logo-text">Nexus CRM</span>
      </div>
      <div class="code">404</div>
      <div class="title">Page not found</div>
      <div class="sub">The page you're looking for doesn't exist or has been moved.</div>
    </div>
    <div class="card-body">
      <div class="btns">
        <a href="/crm.html" class="btn">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
          </svg>
          Back to Dashboard
        </a>
        <a href="/login" class="btn-ghost">Sign in</a>
      </div>
    </div>
  </div>
</body>
</html>
